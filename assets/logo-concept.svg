<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d14"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="cyanPink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#ff2d7a"/>
    </linearGradient>
    <linearGradient id="eyeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#00ff88"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="128" height="128" fill="url(#bg)"/>
  
  <!-- Outer frame - tech border -->
  <rect x="12" y="12" width="104" height="104" rx="20" fill="none" stroke="url(#cyanPink)" stroke-width="1.5" opacity="0.4"/>
  <rect x="16" y="16" width="96" height="96" rx="16" fill="none" stroke="url(#cyanPink)" stroke-width="0.5" opacity="0.2"/>
  
  <!-- Bot head silhouette forming P -->
  <g filter="url(#glow)">
    <!-- Head outline - rounded square -->
    <path d="M32 28 L32 100 Q32 108 40 108 L48 108 Q56 108 56 100 L56 64 L72 64 Q88 64 88 52 Q88 40 72 40 L56 40 L56 28 Q56 20 48 20 L40 20 Q32 20 32 28 Z" 
          fill="none" 
          stroke="url(#cyanPink)" 
          stroke-width="3"
          stroke-linejoin="round"/>
    
    <!-- P letterform cut into the head -->
    <path d="M40 36 L40 92 L48 92 L48 72 L56 72 L56 36 L48 36 Z" 
          fill="url(#cyanPink)" 
          opacity="0.15"/>
    <path d="M40 36 L40 92 M40 36 L56 36 L56 56 L48 56 L48 72 L56 72" 
          fill="none" 
          stroke="url(#cyanPink)" 
          stroke-width="3"
          stroke-linecap="round"
          stroke-linejoin="round"/>
  </g>
  
  <!-- Bot eye - scanning/seeing -->
  <g filter="url(#softGlow)">
    <!-- Eye socket -->
    <ellipse cx="72" cy="50" rx="14" ry="10" fill="#0a0a12"/>
    
    <!-- Iris -->
    <circle cx="72" cy="50" r="8" fill="url(#eyeGrad)" opacity="0.9"/>
    
    <!-- Pupil -->
    <circle cx="72" cy="50" r="4" fill="#0d0d14"/>
    
    <!-- Highlight -->
    <circle cx="74" cy="48" r="2" fill="#ffffff" opacity="0.8"/>
    
    <!-- Scanning ring -->
    <circle cx="72" cy="50" r="12" fill="none" stroke="#00d4ff" stroke-width="0.75" opacity="0.4"/>
  </g>
  
  <!-- Antenna / sensor on top -->
  <line x1="72" y1="20" x2="72" y2="10" stroke="url(#cyanPink)" stroke-width="2" stroke-linecap="round"/>
  <circle cx="72" cy="8" r="3" fill="#00d4ff" filter="url(#glow)"/>
  
  <!-- Data stream lines -->
  <g stroke="url(#cyanPink)" stroke-width="1" opacity="0.3" stroke-linecap="round">
    <line x1="92" y1="36" x2="104" y2="36"/>
    <line x1="96" y1="44" x2="108" y2="44"/>
    <line x1="94" y1="52" x2="106" y2="52"/>
  </g>
  
  <!-- Corner accents -->
  <g fill="#00d4ff" opacity="0.5">
    <circle cx="24" cy="24" r="1.5"/>
    <circle cx="104" cy="24" r="1.5"/>
    <circle cx="24" cy="104" r="1.5"/>
    <circle cx="104" cy="104" r="1.5"/>
  </g>
</svg>
