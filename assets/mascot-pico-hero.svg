<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <!-- Deep space void -->
    <radialGradient id="void" cx="50%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#0d0d1a"/>
      <stop offset="70%" style="stop-color:#050510"/>
      <stop offset="100%" style="stop-color:#000005"/>
    </radialGradient>
    
    <!-- Neural gradients -->
    <linearGradient id="neuralCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    
    <linearGradient id="neuralIndigo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    
    <linearGradient id="neuralPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    
    <linearGradient id="signal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="50%" style="stop-color:#f472b6"/>
      <stop offset="100%" style="stop-color:#fb7185"/>
    </linearGradient>
    
    <linearGradient id="goldAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    
    <!-- Filters -->
    <filter id="coreGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8" result="blur1"/>
      <feGaussianBlur stdDeviation="15" result="blur2"/>
      <feGaussianBlur stdDeviation="25" result="blur3"/>
      <feMerge>
        <feMergeNode in="blur3"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="nodeGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="haloGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    
    <!-- Pattern for background grid -->
    <pattern id="hexGrid" x="0" y="0" width="30" height="26" patternUnits="userSpaceOnUse">
      <polygon points="15,0 30,7.5 30,22.5 15,30 0,22.5 0,7.5" fill="none" stroke="#6366f1" stroke-width="0.3" opacity="0.08"/>
    </pattern>
  </defs>
  
  <!-- Deep void background -->
  <rect width="400" height="400" fill="url(#void)"/>
  
  <!-- Hexagonal grid pattern -->
  <rect width="400" height="400" fill="url(#hexGrid)"/>
  
  <!-- Constellation background -->
  <g opacity="0.5">
    <circle cx="30" cy="40" r="0.8" fill="#fff"/>
    <circle cx="60" cy="25" r="0.5" fill="#fff"/>
    <circle cx="350" cy="35" r="0.6" fill="#fff"/>
    <circle cx="380" cy="70" r="0.4" fill="#fff"/>
    <circle cx="20" cy="180" r="0.5" fill="#6366f1"/>
    <circle cx="380" cy="200" r="0.6" fill="#a855f7"/>
    <circle cx="25" cy="320" r="0.4" fill="#fff"/>
    <circle cx="375" cy="340" r="0.5" fill="#00d4ff"/>
    <circle cx="50" cy="380" r="0.3" fill="#fff"/>
    <circle cx="350" cy="375" r="0.4" fill="#fff"/>
    <circle cx="100" cy="20" r="0.3" fill="#f472b6"/>
    <circle cx="300" cy="380" r="0.3" fill="#22d3ee"/>
  </g>
  
  <!-- Outer consciousness rings -->
  <g fill="none" stroke-width="0.5">
    <circle cx="200" cy="200" r="170" stroke="url(#neuralCyan)" opacity="0.1"/>
    <circle cx="200" cy="200" r="160" stroke="url(#neuralIndigo)" opacity="0.15" stroke-dasharray="3 6"/>
    <circle cx="200" cy="200" r="150" stroke="url(#signal)" opacity="0.12" stroke-dasharray="1 4"/>
    <circle cx="200" cy="200" r="140" stroke="url(#neuralPurple)" opacity="0.1" stroke-dasharray="8 4"/>
  </g>
  
  <!-- Data streams - vertical constellation lines -->
  <g stroke="url(#neuralIndigo)" stroke-width="0.3" opacity="0.2">
    <line x1="60" y1="0" x2="60" y2="400"/>
    <line x1="80" y1="0" x2="80" y2="400"/>
    <line x1="340" y1="0" x2="340" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
  </g>
  
  <!-- The P letterform - main neural structure -->
  <g filter="url(#softGlow)">
    <!-- Main stem with depth -->
    <line x1="140" y1="70" x2="140" y2="330" stroke="url(#neuralCyan)" stroke-width="6" stroke-linecap="round"/>
    <line x1="140" y1="70" x2="140" y2="330" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
    
    <!-- Top horizontal -->
    <line x1="140" y1="70" x2="210" y2="70" stroke="url(#neuralCyan)" stroke-width="6" stroke-linecap="round"/>
    <line x1="140" y1="70" x2="210" y2="70" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
    
    <!-- P loop outer -->
    <path d="M210 70 L210 140 Q280 140 280 105 Q280 70 210 70" 
          fill="none" stroke="url(#neuralIndigo)" stroke-width="6" stroke-linecap="round"/>
    <path d="M210 70 L210 140 Q280 140 280 105 Q280 70 210 70" 
          fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
    
    <!-- Internal neural connections -->
    <line x1="160" y1="95" x2="250" y2="95" stroke="url(#neuralIndigo)" stroke-width="1.5" opacity="0.5"/>
    <line x1="160" y1="120" x2="250" y2="120" stroke="url(#neuralIndigo)" stroke-width="1" opacity="0.4"/>
    <line x1="175" y1="70" x2="175" y2="140" stroke="url(#neuralPurple)" stroke-width="0.8" opacity="0.4"/>
    <line x1="230" y1="80" x2="230" y2="130" stroke="url(#signal)" stroke-width="0.6" opacity="0.3"/>
  </g>
  
  <!-- Neural nodes - the intelligence points -->
  <g filter="url(#nodeGlow)">
    <!-- Core stem nodes -->
    <circle cx="140" cy="70" r="8" fill="#00d4ff"/>
    <circle cx="140" cy="70" r="4" fill="#fff" opacity="0.8"/>
    
    <circle cx="140" cy="200" r="8" fill="#6366f1"/>
    <circle cx="140" cy="200" r="4" fill="#fff" opacity="0.6"/>
    
    <circle cx="140" cy="330" r="8" fill="#00d4ff"/>
    <circle cx="140" cy="330" r="4" fill="#fff" opacity="0.8"/>
    
    <!-- Loop nodes -->
    <circle cx="210" cy="70" r="6" fill="#6366f1"/>
    <circle cx="280" cy="105" r="6" fill="#a855f7"/>
    <circle cx="210" cy="140" r="6" fill="#6366f1"/>
    <circle cx="210" cy="105" r="4" fill="#fff" opacity="0.5"/>
    
    <!-- Cross-section nodes -->
    <circle cx="175" cy="105" r="3" fill="#22d3ee"/>
    <circle cx="240" cy="105" r="3" fill="#f472b6"/>
    <circle cx="250" cy="95" r="2.5" fill="#a855f7"/>
    <circle cx="260" cy="120" r="2" fill="#fbbf24"/>
  </g>
  
  <!-- The Mind Core - central consciousness -->
  <g filter="url(#coreGlow)">
    <circle cx="140" cy="200" r="30" fill="none" stroke="url(#neuralIndigo)" stroke-width="2" opacity="0.4"/>
    <circle cx="140" cy="200" r="22" fill="none" stroke="url(#neuralPurple)" stroke-width="1.5" opacity="0.5"/>
    <circle cx="140" cy="200" r="15" fill="url(#neuralIndigo)" opacity="0.3"/>
    <circle cx="140" cy="200" r="10" fill="url(#neuralCyan)" opacity="0.5"/>
    <circle cx="140" cy="200" r="5" fill="#ffffff" opacity="0.9"/>
  </g>
  
  <!-- Floating signal particles - external data -->
  <g filter="url(#nodeGlow)">
    <!-- Left cluster -->
    <circle cx="80" cy="120" r="4" fill="#00d4ff" opacity="0.7"/>
    <circle cx="60" cy="160" r="3" fill="#6366f1" opacity="0.6"/>
    <circle cx="70" cy="200" r="3.5" fill="#a855f7" opacity="0.7"/>
    <circle cx="55" cy="250" r="2.5" fill="#22d3ee" opacity="0.5"/>
    
    <!-- Right cluster -->
    <circle cx="320" cy="100" r="4" fill="#f472b6" opacity="0.7"/>
    <circle cx="340" cy="140" r="3" fill="#fb7185" opacity="0.6"/>
    <circle cx="330" cy="180" r="3.5" fill="#a855f7" opacity="0.7"/>
    <circle cx="350" cy="220" r="2.5" fill="#fbbf24" opacity="0.5"/>
    
    <!-- Scattered -->
    <circle cx="90" cy="280" r="2" fill="#22d3ee" opacity="0.4"/>
    <circle cx="310" cy="260" r="2" fill="#f472b6" opacity="0.4"/>
    <circle cx="100" cy="320" r="2" fill="#6366f1" opacity="0.3"/>
    <circle cx="300" cy="310" r="2" fill="#00d4ff" opacity="0.3"/>
  </g>
  
  <!-- Signal transmission paths -->
  <g fill="none" stroke="url(#signal)" stroke-width="1" opacity="0.4">
    <!-- Left side signals -->
    <path d="M80 120 Q90 140 100 160 Q110 180 100 200"/>
    <path d="M70 200 Q80 220 90 250"/>
    
    <!-- Right side signals -->
    <path d="M280 105 Q300 100 320 100"/>
    <path d="M280 105 Q310 120 330 140 Q350 160 340 180"/>
    <path d="M280 120 Q310 140 330 180 Q345 200 350 220"/>
  </g>
  
  <!-- Quantum uncertainty halos -->
  <g stroke="#a855f7" fill="none" opacity="0.3">
    <circle cx="280" cy="105" r="15"/>
    <circle cx="280" cy="105" r="22" stroke-dasharray="2 3"/>
    <circle cx="280" cy="105" r="30" stroke-width="0.3"/>
  </g>
  
  <!-- Energy pulse rings -->
  <g fill="none" stroke="url(#signal)" opacity="0.15">
    <circle cx="140" cy="200" r="45"/>
    <circle cx="140" cy="200" r="60" stroke-dasharray="4 8"/>
    <circle cx="140" cy="200" r="80" stroke-dasharray="2 6"/>
  </g>
  
  <!-- Top processing indicator -->
  <g transform="translate(280, 50)" filter="url(#nodeGlow)">
    <circle cx="0" cy="0" r="5" fill="#fbbf24"/>
    <!-- Signal rays -->
    <g stroke="#fbbf24" stroke-width="1" opacity="0.5">
      <line x1="8" y1="0" x2="20" y2="0"/>
      <line x1="6" y1="-6" x2="15" y2="-15"/>
      <line x1="6" y1="6" x2="15" y2="15"/>
    </g>
  </g>
  
  <!-- Bottom precision markers -->
  <g transform="translate(200, 355)">
    <line x1="-40" y1="0" x2="40" y2="0" stroke="url(#signal)" stroke-width="1.5"/>
    <circle cx="-40" cy="0" r="3" fill="#00d4ff" filter="url(#nodeGlow)"/>
    <circle cx="0" cy="0" r="4" fill="#f472b6" filter="url(#nodeGlow)"/>
    <circle cx="40" cy="0" r="3" fill="#00d4ff" filter="url(#nodeGlow)"/>
  </g>
  
  <!-- Subtle watermark text -->
  <text x="200" y="385" font-family="monospace" font-size="8" fill="#6366f1" text-anchor="middle" opacity="0.3" letter-spacing="4">PICO</text>
</svg>
