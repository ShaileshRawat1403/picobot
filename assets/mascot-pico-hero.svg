<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0C1638"/>
      <stop offset="100%" stop-color="#0a0a12"/>
    </linearGradient>
    <linearGradient id="pGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F7BFF"/>
      <stop offset="100%" stop-color="#7A4DFF"/>
    </linearGradient>
  </defs>
  
  <rect width="400" height="400" rx="48" fill="url(#bgGrad)"/>
  
  <!-- Large P mark -->
  <g transform="translate(80, 60)">
    <rect x="0" y="0" width="60" height="220" rx="10" fill="url(#pGrad)"/>
    <rect x="0" y="0" width="130" height="60" rx="10" fill="url(#pGrad)"/>
    <path d="M60 0 L60 120 Q190 120 190 60 Q190 0 60 0 Z" fill="url(#pGrad)"/>
  </g>
  
  <!-- Accent dot -->
  <circle cx="310" cy="90" r="14" fill="#FF6B6B"/>
  
  <!-- Subtle line -->
  <rect x="80" y="330" width="240" height="6" rx="3" fill="url(#pGrad)" opacity="0.2"/>
  
  <!-- PICO text -->
  <text x="200" y="375" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" letter-spacing="8" fill="#4F7BFF" opacity="0.5">PICO</text>
</svg>
