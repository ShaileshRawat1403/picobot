<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="picoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F7BFF"/>
      <stop offset="100%" stop-color="#7A4DFF"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="100%" stop-color="#FF3B30"/>
    </linearGradient>
    <linearGradient id="subtleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4F7BFF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7A4DFF" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="#0C1638"/>
  
  <!-- Subtle grid pattern -->
  <g stroke="#4F7BFF" stroke-width="0.5" opacity="0.1">
    <line x1="0" y1="100" x2="400" y2="100"/>
    <line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="300" x2="400" y2="300"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
  </g>
  
  <!-- Main P letterform - bold geometric -->
  <g fill="url(#picoGradient)">
    <!-- Vertical stem -->
    <rect x="100" y="60" width="50" height="220" rx="8"/>
    
    <!-- Top bar -->
    <rect x="100" y="60" width="100" height="50" rx="8"/>
    
    <!-- P bowl -->
    <path d="M150 60 L150 130 Q230 130 230 95 Q230 60 150 60 Z" rx="8"/>
  </g>
  
  <!-- Inner P details - subtle -->
  <rect x="115" y="180" width="20" height="80" rx="4" fill="#7A4DFF" opacity="0.4"/>
  
  <!-- Core node - the mind -->
  <rect x="120" y="165" width="25" height="25" rx="4" fill="url(#accentGradient)"/>
  
  <!-- Signal indicators -->
  <circle cx="280" cy="85" r="12" fill="url(#accentGradient)"/>
  <circle cx="310" cy="115" r="8" fill="#4F7BFF" opacity="0.7"/>
  <circle cx="300" cy="150" r="6" fill="#7A4DFF" opacity="0.5"/>
  <circle cx="320" cy="180" r="5" fill="#4F7BFF" opacity="0.4"/>
  
  <!-- Connection lines -->
  <line x1="230" y1="85" x2="268" y2="85" stroke="url(#picoGradient)" stroke-width="3" stroke-linecap="round"/>
  <line x1="230" y1="110" x2="302" y2="113" stroke="#4F7BFF" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="230" y1="130" x2="294" y2="148" stroke="#7A4DFF" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  
  <!-- Data particles -->
  <circle cx="340" cy="90" r="3" fill="#4F7BFF" opacity="0.6"/>
  <circle cx="355" cy="110" r="2" fill="#7A4DFF" opacity="0.5"/>
  <circle cx="80" cy="200" r="4" fill="#4F7BFF" opacity="0.3"/>
  <circle cx="60" cy="250" r="3" fill="#7A4DFF" opacity="0.2"/>
  
  <!-- Bottom accent bar -->
  <rect x="100" y="340" width="200" height="4" rx="2" fill="url(#subtleGradient)"/>
  
  <!-- PICO text -->
  <text x="200" y="375" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="800" letter-spacing="8" fill="#4F7BFF" opacity="0.6">PICO</text>
</svg>
