<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF2D7A"/>
      <stop offset="100%" stop-color="#FF6B6B"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background Hexagon -->
  <path d="M256 40 L442 148 L442 364 L256 472 L70 364 L70 148 Z" fill="#0A0A14" stroke="#1A1A2E" stroke-width="4"/>
  
  <!-- Circuit Grid - Subtle -->
  <g stroke="#ffffff" stroke-width="1" opacity="0.08" fill="none">
    <path d="M70 148 L256 256 L442 148"/>
    <path d="M256 472 L256 256"/>
    <circle cx="256" cy="256" r="120" stroke-dasharray="8 12"/>
    <circle cx="256" cy="256" r="180" stroke-dasharray="4 20"/>
  </g>

  <!-- The "P" Core - Highly Stylized Robot Form -->
  <g filter="url(#glow)">
    <!-- Vertical Spine -->
    <rect x="160" y="120" width="32" height="272" rx="16" fill="url(#primary)"/>
    
    <!-- Outer Loop -->
    <path d="M160 120 C280 120 352 160 352 220 C352 280 280 320 160 320" 
          fill="none" 
          stroke="url(#primary)" 
          stroke-width="32" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
          
    <!-- Connecting Bridge -->
    <rect x="160" y="210" width="160" height="24" rx="12" fill="url(#primary)" opacity="0.8"/>
  </g>

  <!-- Neural Nodes - Glowing points of intelligence -->
  <g filter="url(#soft-glow)">
    <!-- Main Eye - The "P" Loop center -->
    <circle cx="256" cy="220" r="18" fill="url(#accent)"/>
    <circle cx="256" cy="220" r="8" fill="#FFFFFF"/>
    
    <!-- Peripheral Nodes -->
    <circle cx="176" cy="136" r="10" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="176" cy="222" r="8" fill="#6366F1"/>
    <circle cx="176" cy="376" r="10" fill="#00D4FF"/>
    
    <circle cx="352" cy="220" r="10" fill="#FF2D7A"/>
    <circle cx="280" cy="125" r="6" fill="#6366F1" opacity="0.7"/>
    <circle cx="280" cy="315" r="6" fill="#6366F1" opacity="0.7"/>
  </g>

  <!-- Data Streams - Dynamic Motion -->
  <g fill="none" stroke="url(#primary)" stroke-width="4" stroke-linecap="round" opacity="0.4">
    <path d="M360 180 Q400 160 420 200" stroke-dasharray="10 15"/>
    <path d="M360 260 Q400 280 420 240" stroke-dasharray="8 12"/>
  </g>
  
  <!-- Outer Ring - Stability -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="url(#primary)" stroke-width="2" opacity="0.1"/>
  <path d="M256 16 A240 240 0 0 1 496 256" fill="none" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
</svg>
