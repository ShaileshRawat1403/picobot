<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- High-Tech Hex-Glyph P -->
  <g transform="translate(100, 100)">
    <!-- Base Hexagon Frame (Ghosted) -->
    <path d="M156 10 L292 88 L292 244 L156 322 L20 244 L20 88 Z" fill="none" stroke="#6366F1" stroke-width="2" opacity="0.1"/>
    
    <!-- P Letterform -->
    <g filter="url(#glow)">
      <!-- Main Stem -->
      <path d="M60 40 L60 282" stroke="url(#primary-grad)" stroke-width="48" stroke-linecap="round"/>
      
      <!-- Precision Loop -->
      <path d="M60 40 C220 40 252 100 252 150 C252 200 220 260 60 260" 
            fill="none" 
            stroke="url(#primary-grad)" 
            stroke-width="48" 
            stroke-linecap="round"/>
            
      <!-- Technical Gap / Intersection -->
      <rect x="36" y="140" width="48" height="20" fill="#0A0A14"/>
    </g>

    <!-- Core Intelligent Node -->
    <circle cx="210" cy="150" r="16" fill="#FFFFFF"/>
    <circle cx="210" cy="150" r="8" fill="#FF2D7A"/>
  </g>
</svg>
