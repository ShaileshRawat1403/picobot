<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1a"/>
      <stop offset="100%" style="stop-color:#050510"/>
    </linearGradient>
    <linearGradient id="neural" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  
  <!-- P letterform -->
  <g filter="url(#glow)">
    <line x1="10" y1="8" x2="10" y2="24" stroke="url(#neural)" stroke-width="2" stroke-linecap="round"/>
    <line x1="10" y1="8" x2="16" y2="8" stroke="url(#neural)" stroke-width="2" stroke-linecap="round"/>
    <path d="M16 8 L16 13 Q22 13 22 10.5 Q22 8 16 8" fill="none" stroke="url(#neural)" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Core node -->
  <circle cx="10" cy="16" r="2" fill="#00d4ff" filter="url(#glow)"/>
  
  <!-- Signal dot -->
  <circle cx="24" cy="8" r="1.5" fill="#f472b6"/>
</svg>
