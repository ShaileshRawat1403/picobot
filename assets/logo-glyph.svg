<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#c44569"/>
    </linearGradient>
  </defs>
  
  <!-- Dark background with subtle border -->
  <rect x="8" y="8" width="112" height="112" rx="24" fill="url(#dark)" stroke="#2d2d44" stroke-width="1"/>
  
  <!-- Minimal P - thick geometric strokes -->
  <path d="M36 32 L36 96" 
        fill="none" 
        stroke="#ffffff" 
        stroke-width="10" 
        stroke-linecap="round"/>
        
  <path d="M36 32 L68 32 C82 32 88 44 88 52 C88 60 82 64 68 64 L36 64" 
        fill="none" 
        stroke="#ffffff" 
        stroke-width="10" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
  
  <!-- Precision dot - coral accent -->
  <circle cx="80" cy="24" r="5" fill="url(#accent)"/>
</svg>
