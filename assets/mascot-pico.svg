<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <!-- Deep space gradient -->
    <radialGradient id="void" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#0a0a14"/>
      <stop offset="100%" style="stop-color:#000005"/>
    </radialGradient>
    
    <!-- Neural activation gradient -->
    <linearGradient id="neural" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="50%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    
    <!-- Signal gradient -->
    <linearGradient id="signal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#f472b6"/>
    </linearGradient>
    
    <!-- Glow filters -->
    <filter id="coreGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="8" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="nodeGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Clip path for P shape -->
    <clipPath id="pShape">
      <path d="M70 40 L70 160 L90 160 L90 100 L130 100 C155 100 170 85 170 60 C170 35 155 20 130 20 L70 20 L70 40 Z"/>
    </clipPath>
  </defs>
  
  <!-- Deep void background -->
  <rect width="200" height="200" fill="url(#void)"/>
  
  <!-- Constellation field - distant stars -->
  <g opacity="0.4">
    <circle cx="20" cy="30" r="0.5" fill="#fff"/>
    <circle cx="45" cy="15" r="0.3" fill="#fff"/>
    <circle cx="160" cy="25" r="0.4" fill="#fff"/>
    <circle cx="180" cy="50" r="0.3" fill="#fff"/>
    <circle cx="15" cy="170" r="0.4" fill="#fff"/>
    <circle cx="185" cy="150" r="0.5" fill="#fff"/>
    <circle cx="30" cy="120" r="0.3" fill="#6366f1"/>
    <circle cx="175" cy="180" r="0.3" fill="#00d4ff"/>
  </g>
  
  <!-- Outer neural rings - representing consciousness layers -->
  <g fill="none" stroke-width="0.5" opacity="0.15">
    <circle cx="100" cy="100" r="85" stroke="url(#neural)"/>
    <circle cx="100" cy="100" r="78" stroke="url(#neural)" stroke-dasharray="2 4"/>
    <circle cx="100" cy="100" r="72" stroke="url(#signal)" stroke-dasharray="1 3"/>
  </g>
  
  <!-- Data streams - vertical -->
  <g stroke="url(#neural)" stroke-width="0.3" opacity="0.3">
    <line x1="40" y1="0" x2="40" y2="200"/>
    <line x1="55" y1="0" x2="55" y2="200"/>
    <line x1="160" y1="0" x2="160" y2="200"/>
    <line x1="145" y1="0" x2="145" y2="200"/>
  </g>
  
  <!-- Neural pathway connections - the P form -->
  <g fill="none" stroke="url(#neural)" stroke-width="1.2" stroke-linecap="round" filter="url(#softGlow)">
    <!-- Main stem -->
    <line x1="70" y1="35" x2="70" y2="165"/>
    
    <!-- Top bar -->
    <line x1="70" y1="35" x2="100" y2="35"/>
    
    <!-- P loop connections -->
    <path d="M100 35 L100 65"/>
    <path d="M100 65 Q140 65 140 50 Q140 35 100 35"/>
    <path d="M100 65 L100 100"/>
    
    <!-- Internal neural paths -->
    <line x1="85" y1="50" x2="125" y2="50" stroke-width="0.6" opacity="0.5"/>
    <line x1="85" y1="65" x2="125" y2="65" stroke-width="0.6" opacity="0.5"/>
    <line x1="115" y1="40" x2="115" y2="70" stroke-width="0.4" opacity="0.4"/>
  </g>
  
  <!-- Neural nodes - the P vertices -->
  <g filter="url(#nodeGlow)">
    <!-- Core nodes -->
    <circle cx="70" cy="35" r="4" fill="#00d4ff"/>
    <circle cx="70" cy="100" r="4" fill="#6366f1"/>
    <circle cx="70" cy="165" r="4" fill="#00d4ff"/>
    
    <!-- Loop nodes -->
    <circle cx="100" cy="35" r="3" fill="#6366f1"/>
    <circle cx="140" cy="50" r="3" fill="#a855f7"/>
    <circle cx="100" cy="65" r="3" fill="#6366f1"/>
    
    <!-- Data intersection nodes -->
    <circle cx="115" cy="50" r="2" fill="#22d3ee"/>
    <circle cx="125" cy="57" r="2" fill="#f472b6"/>
  </g>
  
  <!-- Central core - the "mind" -->
  <g filter="url(#coreGlow)">
    <circle cx="70" cy="100" r="12" fill="none" stroke="url(#neural)" stroke-width="1.5" opacity="0.6"/>
    <circle cx="70" cy="100" r="8" fill="url(#neural)" opacity="0.4"/>
    <circle cx="70" cy="100" r="4" fill="#ffffff" opacity="0.8"/>
  </g>
  
  <!-- Signal particles - data flowing -->
  <g filter="url(#nodeGlow)">
    <circle cx="50" cy="80" r="2" fill="#00d4ff" opacity="0.7"/>
    <circle cx="35" cy="110" r="1.5" fill="#6366f1" opacity="0.6"/>
    <circle cx="150" cy="70" r="2" fill="#a855f7" opacity="0.7"/>
    <circle cx="155" cy="130" r="1.5" fill="#f472b6" opacity="0.6"/>
    <circle cx="45" cy="145" r="1.5" fill="#22d3ee" opacity="0.5"/>
  </g>
  
  <!-- Signal waves emanating -->
  <g fill="none" stroke="url(#signal)" stroke-width="0.8" opacity="0.25">
    <path d="M155 50 Q165 45 170 55 Q175 65 165 70"/>
    <path d="M160 55 Q172 48 178 60 Q182 72 170 78" opacity="0.5"/>
  </g>
  
  <!-- Quantum uncertainty indicators -->
  <g stroke="#00d4ff" stroke-width="0.5" fill="none" opacity="0.3">
    <circle cx="140" cy="50" r="6"/>
    <circle cx="140" cy="50" r="9" stroke-dasharray="1 2"/>
  </g>
  
  <!-- Bottom accent - precision marker -->
  <g transform="translate(100, 175)">
    <line x1="-15" y1="0" x2="15" y2="0" stroke="url(#signal)" stroke-width="1"/>
    <circle cx="0" cy="0" r="2" fill="#f472b6" filter="url(#nodeGlow)"/>
  </g>
</svg>
