<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fb7185"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Gradient background -->
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>
  
  <!-- Animated ring effect (static representation) -->
  <circle cx="64" cy="64" r="50" fill="none" stroke="url(#primary)" stroke-width="0.5" opacity="0.2"/>
  <circle cx="64" cy="64" r="40" fill="none" stroke="url(#accent)" stroke-width="0.5" opacity="0.15"/>
  
  <!-- Neural network P -->
  <g filter="url(#glow)">
    <!-- Stem -->
    <line x1="44" y1="36" x2="44" y2="92" stroke="url(#primary)" stroke-width="7" stroke-linecap="round"/>
    
    <!-- Loop -->
    <path d="M44 36 L70 36 C82 36 88 46 88 54 C88 62 82 68 70 68 L44 68" 
          stroke="url(#primary)" 
          stroke-width="7" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          fill="none"/>
    
    <!-- Nodes on P -->
    <circle cx="44" cy="36" r="5" fill="#22d3ee"/>
    <circle cx="44" cy="68" r="5" fill="#818cf8"/>
    <circle cx="44" cy="92" r="4" fill="#22d3ee"/>
    <circle cx="70" cy="36" r="4" fill="#818cf8"/>
    <circle cx="88" cy="54" r="4" fill="#fb7185"/>
  </g>
  
  <!-- External data nodes -->
  <g filter="url(#glow)">
    <circle cx="100" cy="36" r="4" fill="#fb7185"/>
    <circle cx="106" cy="54" r="3" fill="#fbbf24"/>
    <circle cx="100" cy="72" r="3" fill="#fb7185" opacity="0.7"/>
  </g>
  
  <!-- Data streams -->
  <g fill="none" stroke="url(#accent)" stroke-width="1.5" stroke-linecap="round" opacity="0.8">
    <line x1="88" y1="46" x2="96" y2="38"/>
    <line x1="88" y1="62" x2="102" y2="56"/>
  </g>
  
  <!-- Processing indicator -->
  <g opacity="0.6">
    <circle cx="44" cy="68" r="12" fill="none" stroke="#818cf8" stroke-width="1" stroke-dasharray="4 2"/>
  </g>
</svg>
