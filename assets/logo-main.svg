<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b9d"/>
      <stop offset="100%" style="stop-color:#ff8a5b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="128" height="128" rx="16" fill="url(#bg)"/>
  
  <!-- Subtle grid -->
  <g opacity="0.06" stroke="#00d4ff" stroke-width="0.5">
    <line x1="0" y1="32" x2="128" y2="32"/>
    <line x1="0" y1="64" x2="128" y2="64"/>
    <line x1="0" y1="96" x2="128" y2="96"/>
    <line x1="32" y1="0" x2="32" y2="128"/>
    <line x1="64" y1="0" x2="64" y2="128"/>
    <line x1="96" y1="0" x2="96" y2="128"/>
  </g>
  
  <!-- Neural network lines -->
  <g fill="none" stroke="url(#primary)" stroke-width="1.5" opacity="0.7">
    <line x1="40" y1="32" x2="40" y2="96"/>
    <path d="M40 32 L72 32 C84 32 88 44 88 52 C88 60 84 64 72 64 L40 64"/>
    <line x1="72" y1="48" x2="84" y2="48"/>
    <line x1="84" y1="40" x2="84" y2="56"/>
  </g>
  
  <!-- Main P nodes -->
  <g filter="url(#glow)">
    <circle cx="40" cy="32" r="5" fill="#00d4ff"/>
    <circle cx="40" cy="64" r="5" fill="#6366f1"/>
    <circle cx="40" cy="96" r="5" fill="#00d4ff"/>
    <circle cx="72" cy="32" r="4" fill="#6366f1"/>
    <circle cx="88" cy="52" r="4" fill="#ff6b9d"/>
    <circle cx="84" cy="48" r="3" fill="#ff8a5b"/>
  </g>
  
  <!-- Signal dots -->
  <g filter="url(#glow)">
    <circle cx="96" cy="32" r="3" fill="#ff6b9d"/>
    <circle cx="100" cy="44" r="2" fill="#ff8a5b" opacity="0.7"/>
  </g>
  
  <!-- Pulsing core -->
  <circle cx="40" cy="64" r="10" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
</svg>
