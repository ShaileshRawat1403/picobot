<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF2D7A"/>
      <stop offset="100%" stop-color="#FF6B6B"/>
    </linearGradient>
  </defs>

  <!-- Professional Glyph -->
  <g transform="translate(60, 50) scale(0.6)">
    <rect x="0" y="0" width="48" height="312" rx="4" fill="url(#primary-grad)"/>
    <rect x="0" y="0" width="180" height="48" rx="4" fill="url(#primary-grad)"/>
    <rect x="132" y="48" width="48" height="150" rx="4" fill="url(#primary-grad)"/>
    <rect x="0" y="150" width="180" height="48" rx="4" fill="url(#primary-grad)"/>
    <rect x="144" y="60" width="24" height="24" rx="2" fill="#FFFFFF" opacity="0.9"/>
    <rect x="148" y="64" width="16" height="16" rx="2" fill="url(#accent-grad)"/>
  </g>

  <!-- Modern Typography -->
  <text
    x="260"
    y="160"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="120"
    font-weight="800"
    letter-spacing="-3"
    fill="#081120"
  >
    PICOBOT
  </text>
  <text
    x="264"
    y="208"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="30"
    font-weight="600"
    letter-spacing="4"
    fill="#51617A"
  >
    DAX-BACKED GOVERNED INGRESS
  </text>
</svg>
