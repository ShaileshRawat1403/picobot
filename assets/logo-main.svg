<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4F7BFF"/>
      <stop offset="100%" stop-color="#7A4DFF"/>
    </linearGradient>
  </defs>
  
  <!-- Clean P mark - minimal, confident -->
  <g transform="translate(80, 50)">
    <rect x="0" y="0" width="45" height="180" rx="6" fill="url(#textGrad)"/>
    <rect x="0" y="0" width="90" height="45" rx="6" fill="url(#textGrad)"/>
    <path d="M45 0 L45 90 Q135 90 135 45 Q135 0 45 0 Z" fill="url(#textGrad)"/>
  </g>
  
  <!-- PICO text - bold, modern -->
  <text
    x="280"
    y="195"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="140"
    font-weight="800"
    letter-spacing="-1"
    fill="url(#textGrad)"
  >
    PICO
  </text>
  
  <!-- Subtle line underneath -->
  <rect x="280" y="215" width="380" height="4" rx="2" fill="url(#textGrad)" opacity="0.25"/>
</svg>
